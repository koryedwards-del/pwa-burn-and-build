name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'myplan/**'
      - 'createyourfoodplan/**'
      - 'questionnaire/**'
      - 'program-report/**'
      - 'menuplanner/**'
      - 'mealplanner/**'
      - 'css/**'
      - 'js/**'
      - 'data/**'
      - 'img/**'
      - 'icons/**'
      - 'contacts/**'
      - 'privacypolicy.html'
      - 'support.html'
      - 'sw.js'
      - 'CNAME'
      - 'scripts/build-pages.sh'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: landing-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Pages artifact
        run: bash scripts/build-pages.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
