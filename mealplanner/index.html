<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>Burn &amp; Build — Meal Planner</title>
  <link rel="stylesheet" href="css/planner.css" />
</head>
<body>
  <div class="planner-app">
    <header class="planner-header">
      <h1 class="planner-title">Meal Planner</h1>
      <p class="planner-subtitle">Step 1 — shell</p>
    </header>

    <main class="planner-frame">
      <section class="frame-zone frame-zone--week" aria-label="Week grid">
        <p class="frame-label">Week</p>
      </section>

      <section class="frame-zone frame-zone--workspace" aria-label="Planner workspace">
        <div class="frame-column">
          <p class="frame-label">Day</p>
        </div>
        <div class="frame-column">
          <p class="frame-label">Meals</p>
        </div>
        <div class="frame-column">
          <p class="frame-label">Foods</p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
