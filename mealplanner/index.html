<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>Burn &amp; Build — Meal Planner</title>
  <link rel="stylesheet" href="css/planner.css?v=7" />
</head>
<body>
  <div class="planner-app">
    <header class="planner-header">
      <h1 class="planner-title">Meal Planner</h1>
      <p class="planner-subtitle">Step 7 — save meals from day slots</p>
    </header>

    <main class="planner-frame">
      <div class="week-panel">
        <div class="week-panel__header">
          <p class="col-heading col-heading--week">Week</p>
          <button type="button" class="day-col__clear" id="clear-week-menu">Clear Week</button>
        </div>
        <section class="week-grid" id="week-grid" aria-label="Week"></section>
      </div>

      <section class="workspace" aria-label="Planner workspace">
        <div class="workspace__col workspace__col--day">
          <div class="day-col-header">
            <p class="col-heading col-heading--day" id="active-day-label">Wednesday</p>
            <button type="button" class="day-col__clear" id="clear-day-menu">Clear Menu</button>
          </div>
          <div class="day-slots" id="day-slots"></div>
        </div>

        <div class="workspace__col workspace__col--meals">
          <p class="col-heading">Saved Meals</p>
          <div class="saved-meals" id="saved-meals"></div>
        </div>

        <div class="workspace__col workspace__col--foods">
          <p class="col-heading">Foods</p>

          <p class="food-filter-label" id="food-filter-label" hidden></p>
          <div class="food-filters" id="food-filters"></div>
          <div class="food-stack" id="food-stack"></div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="save-meal-dialog" class="save-dialog">
    <form method="dialog" class="save-dialog__form" id="save-meal-form">
      <p class="save-dialog__title">Name this meal</p>
      <input
        type="text"
        id="save-meal-name"
        class="save-dialog__input"
        placeholder="e.g. Chicken Bowl"
        maxlength="48"
        required
        autocomplete="off"
      />
      <div class="save-dialog__actions">
        <button type="button" class="save-dialog__btn save-dialog__btn--ghost" id="save-meal-cancel">Cancel</button>
        <button type="submit" class="save-dialog__btn save-dialog__btn--primary">Save Meal</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/planner.js?v=11"></script>
</body>
</html>
