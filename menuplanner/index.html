<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>Burn &amp; Build — Menu Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/program-bridge.css?v=5" />
  <link rel="stylesheet" href="css/planner.css?v=19" />
</head>
<body>
  <section id="access-gate" class="mp-access" hidden>
    <div class="mp-access__panel">
      <img class="mp-access__logo" src="../img/brand/bblogo.png" alt="" width="72" height="72" />
      <p class="mp-access__eyebrow">Burn &amp; Build</p>
      <h1 class="mp-access__title">Menu planner</h1>
      <p class="mp-access__lead">Enter the email you used when you created your program.</p>
      <form id="access-form" class="mp-access__form">
        <label class="mp-access__field">
          <span class="mp-access__label">Email</span>
          <input
            id="access-email"
            class="mp-access__input"
            type="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </label>
        <p id="access-error" class="mp-access__error" hidden></p>
        <p id="access-hint" class="mp-access__hint" hidden></p>
        <button type="submit" class="mp-access__submit" id="access-submit">Open menu planner</button>
      </form>
      <p class="mp-access__footer">New here? <a class="mp-access__link" href="../questionnaire/#welcome">Create your diet</a></p>
    </div>
  </section>

  <div id="planner-root" class="planner-app" hidden>
    <header class="planner-header">
      <div class="planner-brand">
        <img class="planner-logo" src="../img/brand/bblogo.png" alt="Burn &amp; Build" width="56" height="56" />
        <div class="planner-brand__text">
          <h1 class="planner-title">Your Program</h1>
        </div>
      </div>
    </header>

    <div class="pb-layout planner-layout">
      <nav class="pb-nav" aria-label="Program report" id="program-nav"></nav>

      <div class="planner-main">
        <div class="pb-page-head">
          <p class="pb-eyebrow">Page 4</p>
          <h2 class="pb-panel__title">Menu planner</h2>
        </div>

        <div class="pb-doc planner-meta" id="planner-meta"></div>

        <main class="planner-frame">
          <div class="week-panel">
            <div class="week-panel__header">
              <p class="col-heading col-heading--week">Week</p>
              <div class="week-panel__actions">
                <div class="print-assistant-anchor">
                  <button type="button" class="slot__save" id="print-assistant">Print Assistant</button>
                  <div class="planner-toast-host" id="planner-toast-host" aria-live="polite" role="status"></div>
                </div>
                <button type="button" class="day-col__clear" id="clear-week-menu">Clear Week</button>
              </div>
            </div>
            <section class="week-grid" id="week-grid" aria-label="Week"></section>
          </div>

          <section class="workspace" aria-label="Planner workspace">
            <div class="workspace__col workspace__col--day">
              <div class="day-col-header">
                <p class="col-heading col-heading--day" id="active-day-label">Wednesday</p>
                <button type="button" class="day-col__clear" id="clear-day-menu">Clear Menu</button>
              </div>
              <div class="day-slots" id="day-slots"></div>
            </div>

            <div class="workspace__col workspace__col--meals">
              <p class="col-heading">Saved Meals</p>
              <div class="saved-meals" id="saved-meals"></div>
            </div>

            <div class="workspace__col workspace__col--foods">
              <p class="col-heading">Foods</p>

              <p class="food-filter-label" id="food-filter-label" hidden></p>
              <input
                type="search"
                class="food-search"
                id="food-search"
                placeholder="Search foods…"
                autocomplete="off"
                hidden
              />
              <div class="food-filters" id="food-filters"></div>
              <div class="food-stack" id="food-stack"></div>
            </div>
          </section>
        </main>

        <footer class="pb-actions">
          <a class="pb-btn pb-btn--ghost" href="../program-report/?page=servings" id="planner-back">← Servings</a>
        </footer>
      </div>
    </div>
  </div>

  <dialog id="save-meal-dialog" class="save-dialog">
    <form method="dialog" class="save-dialog__form" id="save-meal-form">
      <p class="save-dialog__title">Name this meal</p>
      <input
        type="text"
        id="save-meal-name"
        class="save-dialog__input"
        placeholder="e.g. Chicken Bowl"
        maxlength="48"
        required
        autocomplete="off"
      />
      <div class="save-dialog__actions">
        <button type="button" class="save-dialog__btn save-dialog__btn--ghost" id="save-meal-cancel">Cancel</button>
        <button type="submit" class="save-dialog__btn save-dialog__btn--primary">Save Meal</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/planner.js?v=27"></script>
</body>
</html>
