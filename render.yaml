# Burn & Build — program creator (Render Web Service)
# Render Dashboard → New → Blueprint → connect pwa-burn-and-build repo

services:
  - type: web
    name: program-creator
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: WEBPAGE_URL
        value: https://gettheburnandbuildapp.com
      - key: CREATOR_BASE_URL
        sync: false
