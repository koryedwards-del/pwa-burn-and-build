# Burn & Build — program creator (Render Web Service)
# Render Dashboard → New → Blueprint → connect pwa-burn-and-build repo

services:
  - type: web
    name: program-creator
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: bnb-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_PATH
        value: /var/data/programs.db
      - key: WEBPAGE_URL
        value: https://gettheburnandbuildapp.com
      - key: CREATOR_BASE_URL
        value: https://gettheburnandbuildapp.com
      - key: API_BASE_URL
        value: https://program-creator-3tzd.onrender.com
      - key: CONTACTS_ADMIN_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_TEST_BYPASS
        sync: false
