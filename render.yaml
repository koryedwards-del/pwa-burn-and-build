# Burn & Build — program creator (Web Service)
# Connect repo in Render → New Blueprint → deploy
# App PWA can stay on GitHub Pages until you move it separately.

services:
  - type: web
    name: burn-and-build-program-creator
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEBPAGE_URL
        sync: false
      - key: CREATOR_BASE_URL
        sync: false
